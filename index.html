<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTDI Live Lesson — Media Queries, Bootstrap 4 &amp; Web Hosting</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <style>
:root {
  --navy:#0d1b2a; --blue:#1a5276; --accent:#00c9b1; --accent2:#f4a261;
  --white:#ffffff; --code-bg:#0d1117; --code-green:#56d364;
  --code-blue:#79c0ff; --code-orange:#ffa657; --code-pink:#ff7b72; --code-yellow:#e3b341;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{
  font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--white);
  height:100dvh; overflow:hidden; -webkit-tap-highlight-color:transparent;
}

/* PROGRESS */
#progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s;z-index:1000;width:0}

/* SLIDES CONTAINER */
#slides{width:100%;height:100dvh;position:relative;overflow:hidden;}

.slide{
  position:absolute;inset:0;display:flex;flex-direction:column;
  justify-content:flex-start;align-items:flex-start;
  padding:clamp(52px,8vw,88px) clamp(14px,5vw,58px) clamp(68px,10vw,86px);
  opacity:0;transform:translateX(36px);
  transition:opacity .42s ease,transform .42s ease;
  pointer-events:none;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
.slide::-webkit-scrollbar{width:3px}
.slide::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all;}
.slide.exit{opacity:0;transform:translateX(-36px);}

/* SLIDE BACKGROUNDS */
.slide-title{background:radial-gradient(ellipse at 30% 50%,#1a3a5c 0%,var(--navy) 70%);justify-content:center;align-items:center;text-align:center;}
.slide-section{background:linear-gradient(135deg,#0a3d5c 0%,#0d1b2a 60%);}
.slide-content{background:var(--navy);}
.slide-code{background:#080f17;}
.slide-split{background:var(--navy);}
.slide-quiz{background:linear-gradient(135deg,#0d2a1f 0%,#0d1b2a 60%);}
.slide-host{background:linear-gradient(135deg,#1a0d2e 0%,#0d1b2a 60%);}

/* TYPOGRAPHY */
.label{font-family:'Space Mono',monospace;font-size:clamp(9px,1.5vw,11px);letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;flex-shrink:0;}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.7rem,6vw,3.8rem);line-height:1.1;color:var(--white);margin-bottom:12px;}
h2{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(1.05rem,3.5vw,2rem);color:var(--white);margin-bottom:12px;flex-shrink:0;}
h3{font-family:'Syne',sans-serif;font-weight:600;font-size:clamp(0.82rem,2vw,1.05rem);color:var(--accent);margin-bottom:8px;}
.subtitle{font-size:clamp(0.82rem,2vw,1.1rem);color:#8ab4cc;max-width:580px;line-height:1.6;}

/* CODE BLOCKS */
.code-block{
  background:var(--code-bg);border:1px solid #30363d;border-radius:10px;
  padding:clamp(10px,2vw,18px) clamp(10px,2vw,22px);
  font-family:'Space Mono',monospace;font-size:clamp(9px,1.2vw,12px);
  line-height:1.75;width:100%;overflow-x:auto;position:relative;flex-shrink:0;
  -webkit-overflow-scrolling:touch;
}
.code-block .file-tag{
  position:absolute;top:-1px;left:14px;background:var(--accent);color:var(--navy);
  font-size:clamp(7px,1vw,10px);font-weight:700;letter-spacing:1px;
  padding:2px 9px;border-radius:0 0 6px 6px;
}
.code-block pre{margin-top:12px;white-space:pre-wrap;word-break:break-word;}
.kw{color:var(--code-pink);}.sel{color:var(--code-blue);}.val{color:var(--code-orange);}
.prop{color:var(--code-green);}.com{color:#6e7681;font-style:italic;}
.str{color:var(--code-yellow);}.tag{color:var(--code-pink);}.attr{color:var(--code-blue);}

/* GRID LAYOUTS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:clamp(10px,2.5vw,26px);width:100%;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2vw,18px);width:100%;}

/* RESPONSIVE BREAKDOWNS */
@media(max-width:640px){
  .two-col,.three-col{grid-template-columns:1fr;}
  .slide{padding:52px 12px 72px;}
  h3{font-size:.82rem;}
  .code-block{font-size:10px;}
}
@media(min-width:641px) and (max-width:900px){
  .three-col{grid-template-columns:1fr 1fr;}
}
@media(max-height:500px) and (orientation:landscape){
  .slide{padding:46px 12px 56px;}
  h1{font-size:1.4rem;} h2{font-size:1rem;margin-bottom:6px;}
  .label{margin-bottom:3px;}
  .code-block{font-size:9px;}
}

/* CARDS */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:clamp(10px,2vw,18px);}
.card-accent{border-left:3px solid var(--accent);}
.card-orange{border-left:3px solid var(--accent2);}
.card-pink{border-left:3px solid #e96b8a;}

/* LISTS */
ul.lesson-list{list-style:none;padding:0;}
ul.lesson-list li{padding:5px 0 5px 20px;position:relative;font-size:clamp(.75rem,1.4vw,.9rem);color:#c5d8e8;border-bottom:1px solid rgba(255,255,255,.05);}
ul.lesson-list li::before{content:"▹";position:absolute;left:0;color:var(--accent);}

/* BADGES */
.badge{display:inline-block;background:rgba(0,201,177,.15);color:var(--accent);border:1px solid rgba(0,201,177,.3);border-radius:20px;padding:3px 9px;font-size:clamp(9px,1.2vw,12px);font-weight:600;font-family:'Space Mono',monospace;margin:2px;}
.badge-orange{background:rgba(244,162,97,.15);color:var(--accent2);border-color:rgba(244,162,97,.3);}
.badge-pink{background:rgba(233,107,138,.15);color:#e96b8a;border-color:rgba(233,107,138,.3);}

/* STEPS */
.step-box{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
.step-num{min-width:26px;height:26px;background:var(--accent);color:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(10px,1.4vw,13px);flex-shrink:0;}
.step-text{font-size:clamp(.75rem,1.4vw,.88rem);color:#c5d8e8;line-height:1.5;padding-top:3px;}
.step-text strong{color:var(--white);}

/* BROWSER MOCKUP */
.browser{background:#1c2730;border-radius:10px;overflow:hidden;border:1px solid #30363d;width:100%;}
.browser-bar{background:#2d3748;padding:6px 12px;display:flex;align-items:center;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;}
.dot-r{background:#ff5f57;}.dot-y{background:#ffbd2e;}.dot-g{background:#28c840;}
.browser-url{background:#1a202c;border-radius:4px;padding:2px 8px;font-size:clamp(8px,1.1vw,10px);color:#8ab4cc;font-family:'Space Mono',monospace;margin-left:6px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.browser-body{padding:10px;}

/* DEVICE MOCKUPS */
.device-row{display:flex;gap:clamp(6px,2vw,18px);align-items:flex-end;justify-content:center;flex-wrap:wrap;}
.device{background:#1c2730;border:2px solid #30363d;border-radius:8px;overflow:hidden;}
.device-desktop{width:clamp(100px,24vw,270px);}
.device-tablet{width:clamp(70px,15vw,170px);}
.device-mobile{width:clamp(44px,8vw,86px);}
.device-header{background:#2d3748;height:16px;display:flex;align-items:center;padding:0 6px;gap:4px;}
.device-content{padding:7px;}
.d-nav{background:#1a5276;height:12px;border-radius:3px;margin-bottom:5px;}
.d-hero{background:linear-gradient(90deg,#00c9b1,#1a5276);height:30px;border-radius:4px;margin-bottom:5px;}
.d-cols{display:flex;gap:4px;}
.d-col{background:rgba(255,255,255,.07);border-radius:3px;flex:1;height:18px;}
.device-label{text-align:center;font-size:clamp(7px,1.1vw,10px);color:#8ab4cc;padding:4px;font-family:'Space Mono',monospace;}

/* GRID DEMO */
.grid-demo{width:100%;}
.g-row{display:flex;gap:4px;margin-bottom:4px;}
.g-col{height:clamp(20px,3vw,34px);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:clamp(7px,.9vw,10px);font-family:'Space Mono',monospace;font-weight:700;color:var(--navy);white-space:nowrap;}
.g-12{flex:12;background:#00c9b1;}.g-6{flex:6;background:#1a5276;color:var(--white);}
.g-4{flex:4;background:#f4a261;}.g-3{flex:3;background:#e96b8a;color:var(--white);}

/* HOSTING CARDS */
.host-card{background:rgba(255,255,255,.04);border-radius:14px;padding:clamp(12px,2.5vw,22px);border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden;}
.host-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.host-card.github::before{background:linear-gradient(90deg,#f4a261,#e96b8a);}
.host-card.wp::before{background:linear-gradient(90deg,#00c9b1,#1a5276);}
.host-icon{font-size:1.5rem;margin-bottom:7px;}
.host-steps{list-style:none;padding:0;}
.host-steps li{font-size:clamp(.72rem,1.3vw,.82rem);color:#c5d8e8;padding:3px 0 3px 18px;position:relative;}
.host-steps li::before{content:"→";position:absolute;left:0;color:var(--accent);}

/* INFO BOXES */
.accent-box{background:rgba(0,201,177,.08);border:1px solid rgba(0,201,177,.25);border-radius:10px;padding:clamp(9px,1.5vw,13px) clamp(10px,2vw,16px);margin:5px 0;font-size:clamp(.72rem,1.3vw,.86rem);color:#c5d8e8;line-height:1.6;}
.accent-box strong{color:var(--accent);}
.orange-box{background:rgba(244,162,97,.08);border:1px solid rgba(244,162,97,.25);border-radius:10px;padding:clamp(9px,1.5vw,13px) clamp(10px,2vw,16px);margin:5px 0;font-size:clamp(.72rem,1.3vw,.86rem);color:#c5d8e8;line-height:1.6;}
.orange-box strong{color:var(--accent2);}

/* TIMER */
#timer{position:fixed;top:10px;left:10px;z-index:200;background:rgba(26,82,118,.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:5px 12px;font-family:'Space Mono',monospace;font-size:clamp(10px,1.4vw,12px);color:var(--accent);}

/* MENU BUTTON */
#menu-btn{position:fixed;top:10px;right:10px;z-index:200;background:rgba(26,82,118,.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:5px 12px;color:var(--white);cursor:pointer;font-size:clamp(10px,1.4vw,12px);font-family:'Space Mono',monospace;letter-spacing:1px;touch-action:manipulation;min-height:36px;}
#menu-btn:active{background:rgba(26,82,118,1);}

/* SLIDE MENU */
#slide-menu{position:fixed;top:0;right:-110%;width:min(290px,85vw);height:100dvh;background:#0a1520;border-left:1px solid rgba(255,255,255,.1);overflow-y:auto;z-index:300;transition:right .3s ease;padding:16px 0;-webkit-overflow-scrolling:touch;}
#slide-menu.open{right:0;}
.menu-item{padding:9px 16px;cursor:pointer;font-size:clamp(10px,1.3vw,12px);color:#8ab4cc;transition:all .2s;border-left:3px solid transparent;font-family:'DM Sans',sans-serif;}
.menu-item:active,.menu-item.active{color:var(--white);background:rgba(255,255,255,.05);border-left-color:var(--accent);}
.menu-section-title{padding:13px 16px 4px;font-size:clamp(8px,1.1vw,10px);letter-spacing:2px;color:var(--accent);font-family:'Space Mono',monospace;text-transform:uppercase;}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.5);}
#overlay.show{display:block;}

/* BOTTOM NAV */
#nav{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(26,82,118,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:6px 18px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.4);}
#nav button{background:none;border:none;color:var(--white);cursor:pointer;font-size:clamp(16px,3vw,20px);padding:5px 10px;border-radius:8px;transition:background .2s;touch-action:manipulation;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;}
#nav button:active{background:rgba(255,255,255,.15);}
#slide-counter{font-family:'Space Mono',monospace;font-size:clamp(10px,1.4vw,12px);color:var(--accent);min-width:55px;text-align:center;}

/* UTILITIES */
.kb-hint{font-size:clamp(9px,1.1vw,11px);color:rgba(255,255,255,.2);font-family:'Space Mono',monospace;margin-top:4px;}
.small{font-size:clamp(.72rem,1.3vw,.82rem);color:#8ab4cc;line-height:1.6;}
.w100{width:100%;}.mt8{margin-top:7px;}.mt16{margin-top:13px;}.mt24{margin-top:19px;}.mb8{margin-bottom:7px;}.mb16{margin-bottom:13px;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite;}

/* SWIPE HINT — mobile only */
.swipe-hint{display:none;font-size:10px;color:rgba(255,255,255,.18);font-family:'Space Mono',monospace;margin-top:6px;}
@media(max-width:640px){.swipe-hint{display:block;}.kb-hint{display:none;}}
</style>
</head>
<body>

<div id="progress-bar"></div>
<div id="timer">⏱ 00:00</div>
<button type="button" id="menu-btn" onclick="toggleMenu()" aria-label="Slide menu">☰ SLIDES</button>

<div id="slides"></div>

  <button type="button"  onclick="prevSlide()" aria-label="Previous">&#8592;</button>

</div>

<script>
const slides=[

{type:'content',section:'L19: Media Queries',html:`
<div class="label">Lesson 19 · Media Queries</div>
<h2>What Is a Media Query?</h2>
<div class="two-col w100">
  <div>
    <div class="card card-accent mb16">
      <h3>Definition</h3>
      <p class="small">A <strong style="color:var(--white)">CSS technique</strong> that applies styles <strong style="color:var(--white)">only when certain conditions are true</strong> — like screen width, device type, or orientation.</p>
    </div>
    <div class="card card-orange">
      <h3>Think of it like...</h3>
      <p class="small">An <strong style="color:var(--white)">if-statement</strong> for your CSS.</p>
      <p class="small mt8"><em>"IF screen &lt; 600px THEN stack columns vertically."</em></p>
    </div>
  </div>
  <div class="code-block">
    <div class="file-tag">CSS</div>
    <pre>
<span class="com">/* ALL screens */</span>
<span class="sel">body</span> {
  <span class="prop">font-size</span>: <span class="val">16px</span>;
}

<span class="com">/* Mobile ONLY */</span>
<span class="kw">@media</span> <span class="sel">screen</span>
  <span class="kw">and</span> (<span class="prop">max-width</span>: <span class="val">600px</span>) {
  <span class="sel">body</span> {
    <span class="prop">font-size</span>: <span class="val">14px</span>;
  }
}</pre>
  </div>
</div>
`},

{type:'code',section:'L19: Syntax',html:`
<div class="label">Lesson 19 · Syntax</div>
<h2>@media Rule — Full Syntax</h2>
<div class="two-col w100">
  <div>
    <div class="code-block mb16">
      <div class="file-tag">SYNTAX</div>
      <pre>
<span class="kw">@media</span> <span class="sel">type</span>
  <span class="kw">and</span> (<span class="prop">expression</span>) {
  <span class="com">/* CSS rules */</span>
}</pre>
    </div>
    <h3>Media Types</h3>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">
      <span class="badge">screen</span><span class="badge badge-orange">print</span>
      <span class="badge badge-pink">all</span><span class="badge">speech</span>
    </div>
    <div class="accent-box mt16"><strong>Tip:</strong> Omitting type defaults to <code style="color:var(--code-blue)">all</code></div>
  </div>
  <div class="code-block">
    <div class="file-tag">styles.css</div>
    <pre>
<span class="com">/* Screen only */</span>
<span class="kw">@media</span> <span class="sel">screen</span>
  <span class="kw">and</span> (<span class="prop">max-width</span>: <span class="val">768px</span>) {
  <span class="sel">.sidebar</span> {
    <span class="prop">display</span>: <span class="val">none</span>;
  }
}

<span class="com">/* Print only */</span>
<span class="kw">@media</span> <span class="sel">print</span> {
  <span class="sel">.navbar</span>, <span class="sel">.footer</span> {
    <span class="prop">display</span>: <span class="val">none</span>;
  }
  <span class="sel">body</span> {
    <span class="prop">color</span>: <span class="val">black</span>;
  }
}

  </div>
</div>

{type:'code',section:'L20: CDN Setup',html:`
<div class="label">Lesson 20 · Setup</div>
<h2>Adding Bootstrap 4 to Your Page</h2>
<div class="two-col w100">
  <div>
    <div class="step-box"><div class="step-num">1</div><div class="step-text">Create <strong>index.html</strong></div></div>
    <div class="step-box"><div class="step-num">2</div><div class="step-text">Add the <strong>viewport meta tag</strong> in &lt;head&gt;</div></div>
    <div class="step-box"><div class="step-num">3</div><div class="step-text">Paste <strong>Bootstrap CSS CDN</strong> in &lt;head&gt;</div></div>
    <div class="step-box"><div class="step-num">4</div><div class="step-text">Paste <strong>Bootstrap JS CDN</strong> before &lt;/body&gt;</div></div>
    <div class="accent-box mt16"><strong>What is a CDN?</strong> Instead of downloading Bootstrap, a CDN serves it from a fast global server automatically.</div>
  </div>
  <div class="code-block">
    <div class="file-tag">index.html</div>
    <pre>
<span class="tag">&lt;!DOCTYPE html&gt;</span>
<span class="tag">&lt;html</span> <span class="attr">lang</span>=<span class="str">"en"</span><span class="tag">&gt;</span>
<span class="tag">&lt;head&gt;</span>
  <span class="tag">&lt;meta</span> <span class="attr">charset</span>=<span class="str">"UTF-8"</span><span class="tag">&gt;</span>
  <span class="com">&lt;!-- Viewport --&gt;</span>
  <span class="tag">&lt;meta</span> <span class="attr">name</span>=<span class="str">"viewport"</span>
    <span class="attr">content</span>=<span class="str">"width=device-width,
    initial-scale=1.0"</span><span class="tag">&gt;</span>
  <span class="tag">&lt;title&gt;</span>My Site<span class="tag">&lt;/title&gt;</span>
  <span class="com">&lt;!-- Bootstrap CSS --&gt;</span>
  <span class="tag">&lt;link</span> <span class="attr">rel</span>=<span class="str">"stylesheet"</span>
    <span class="attr">href</span>=<span class="str">"https://cdn.jsdelivr.net/
npm/bootstrap@4.6.2/dist/
css/bootstrap.min.css"</span><span class="tag">&gt;</span>
<span class="tag">&lt;/head&gt;</span>
<span class="tag">&lt;body&gt;</span>

  <span class="com">&lt;!-- Your content --&gt;</span>

  <span class="com">&lt;!-- Bootstrap JS --&gt;</span>
  <span class="tag">&lt;script</span> <span class="attr">src</span>=<span class="str">"https://cdn.jsdelivr.net/
npm/bootstrap@4.6.2/dist/js/
bootstrap.bundle.min.js"</span><span class="tag">&gt;</span>
  <span class="tag">&lt;/script&gt;</span>
<span class="tag">&lt;/body&gt;&lt;/html&gt;</span></pre>
  </div>
</div>
`},

<span class="tag">&lt;/body&gt;</span></pre>
  </div>
</div>

{type:'code',section:'L21: Grid Classes',html:`
<div class="label">Lesson 21 · Grid Classes</div>
<h2>Grid Classes — Step by Step</h2>
<div class="two-col w100">
  <div class="code-block">
    <div class="file-tag">index.html — Grid</div>
    <pre>
<span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="str">"container"</span><span class="tag">&gt;</span>
  <span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="str">"row"</span><span class="tag">&gt;</span>
    <span class="com">&lt;!-- Full mobile,
         half tablet+ --&gt;</span>
    <span class="tag">&lt;div</span>
      <span class="attr">class</span>=<span class="str">"col-12 col-md-6"</span>
    <span class="tag">&gt;</span>Column 1<span class="tag">&lt;/div&gt;</span>
    <span class="tag">&lt;div</span>
      <span class="attr">class</span>=<span class="str">"col-12 col-md-6"</span>
    <span class="tag">&gt;</span>Column 2<span class="tag">&lt;/div&gt;</span>
  <span class="tag">&lt;/div&gt;</span>
<span class="tag">&lt;/div&gt;</span>

<span class="com">&lt;!-- 3-column --&gt;</span>
<span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="str">"container"</span><span class="tag">&gt;</span>
  <span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="str">"row"</span><span class="tag">&gt;</span>
    <span class="tag">&lt;div</span>
      <span class="attr">class</span>=<span class="str">"col-12 col-md-4"</span>
    <span class="tag">&gt;</span>Box 1<span class="tag">&lt;/div&gt;</span>
    <span class="tag">&lt;div</span>
      <span class="attr">class</span>=<span class="str">"col-12 col-md-4"</span>
    <span class="tag">&gt;</span>Box 2<span class="tag">&lt;/div&gt;</span>
    <span class="tag">&lt;div</span>
      <span class="attr">class</span>=<span class="str">"col-12 col-md-4"</span>
    <span class="tag">&gt;</span>Box 3<span class="tag">&lt;/div&gt;</span>
  <span class="tag">&lt;/div&gt;</span>
<span class="tag">&lt;/div&gt;</span></pre>
  </div>
  <div>
    <div class="orange-box mb16">
      <strong>Formula:</strong><br>
      <code style="color:var(--code-blue)">col-[breakpoint]-[number]</code><br><br>
      • <code style="color:var(--code-orange)">col-12 col-md-6</code><br>full mobile → half medium+<br><br>
      • <code style="color:var(--code-orange)">col-12 col-lg-4</code><br>full mobile → thirds large+<br><br>
      Columns must add to 12
    </div>
    <div class="accent-box">
      <strong>Utility Classes:</strong><br>
      <code style="color:var(--code-green)">mt-3</code> margin-top<br>
      <code style="color:var(--code-green)">p-4</code> padding all sides<br>
      <code style="color:var(--code-green)">text-center</code> centered<br>
      <code style="color:var(--code-green)">d-none d-md-block</code> hide mobile
    </div>
  </div>
</div>
`},

<div class="label">Web Hosting · Introduction</div>
<h2>What Is Web Hosting?</h2>
<div class="two-col w100">
  <div>
    <div class="accent-box mb16">Hosting stores your website files on a <strong>server connected to the internet</strong> — so anyone with your URL can access your site, anywhere, anytime.</div>
    <div class="card card-accent mb16">
      <h3>Without Hosting</h3>
      <p class="small">Your site only exists on your laptop. Nobody else can see it.</p>
    </div>
    <div class="card card-orange">
      <h3>With Hosting</h3>
      <p class="small">Your site is on a server 24/7. Anyone in the world can visit your URL — even while you sleep! 🌍</p>
    </div>
  </div>
  <div class="card" style="border-color:rgba(255,255,255,.1)">
    <h3 style="color:var(--accent2)">Today: 2 Servers</h3>
    <div style="margin-top:12px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="font-size:1.5rem">🐙</div>
        <div><strong style="color:var(--white)">GitHub Pages</strong><br><span class="small">HTML/CSS/JS static sites</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:1.5rem">🔵</div>
        <div><strong style="color:var(--white)">WordPress Hosting</strong><br><span class="small">WordPress CMS sites</span></div>
      </div>
    </div>
    <div class="accent-box mt16"><strong>Key difference:</strong> GitHub Pages = static files. WordPress = PHP + database.</div>
  </div>
</div>

// ── DOM BUILD ────────────────────────────────────────────
const container=document.getElementById('slides');
const menuEl=document.getElementById('slide-menu');
let current=0;

function buildMenu(){
  let lastSec='';
  slides.forEach((s,i)=>{
    if(s.section!==lastSec){
      const t=document.createElement('div');
      t.className='menu-section-title';
      t.textContent=s.section;
      menuEl.appendChild(t);
      lastSec=s.section;
    }
    const item=document.createElement('div');
    item.className='menu-item';
    item.id=`menu-${i}`;
    item.textContent=`${i+1}. ${s.section}`;
    item.onclick=()=>{goTo(i);toggleMenu(false);};
    menuEl.appendChild(item);
  });
}

function buildSlides(){
  slides.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className=`slide slide-${s.type}`;
    el.id=`slide-${i}`;
    el.innerHTML=s.html;
    container.appendChild(el);
  });
}

function goTo(n){
  const prev=document.getElementById(`slide-${current}`);
  if(prev){prev.classList.remove('active');prev.classList.add('exit');setTimeout(()=>prev.classList.remove('exit'),450);prev.scrollTop=0;}
  current=Math.max(0,Math.min(n,slides.length-1));
  const next=document.getElementById(`slide-${current}`);
  if(next)next.classList.add('active');
  document.getElementById('slide-counter').textContent=`${current+1} / ${slides.length}`;
  document.getElementById('progress-bar').style.width=`${((current+1)/slides.length)*100}%`;
  document.querySelectorAll('.menu-item').forEach(el=>el.classList.remove('active'));
  const mi=document.getElementById(`menu-${current}`);
  if(mi){mi.classList.add('active');mi.scrollIntoView({block:'nearest'});}
}

function nextSlide(){goTo(current+1);}
function prevSlide(){goTo(current-1);}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ')nextSlide();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prevSlide();
  if(e.key==='Escape')toggleMenu(false);
});

// Menu
let menuOpen=false;
function toggleMenu(force){
  menuOpen=force!==undefined?force:!menuOpen;
  menuEl.classList.toggle('open',menuOpen);
  document.getElementById('overlay').classList.toggle('show',menuOpen);
}

// Touch swipe (horizontal only, doesn't fight with vertical scroll)
let tx=0,ty=0,tt=0;
document.getElementById('slides').addEventListener('touchstart',e=>{
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now();
},{passive:true});
document.getElementById('slides').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  const dt=Date.now()-tt;
  if(dt<400&&Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)*1.6){
    dx<0?nextSlide():prevSlide();
  }
},{passive:true});

// Timer
let secs=0;
const timerEl=document.getElementById('timer');
setInterval(()=>{
  secs++;
  const h=Math.floor(secs/3600);
  const m=Math.floor((secs%3600)/60);
  const s=secs%60;
  timerEl.textContent=h>0
    ?`⏱ ${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    :`⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
},1000);

// Init
buildSlides();
buildMenu();
goTo(0);
</script>
